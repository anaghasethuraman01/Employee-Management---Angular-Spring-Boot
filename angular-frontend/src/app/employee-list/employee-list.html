<h2>Employee List</h2>
<table class="table table-striped">
  <thead>
    <tr>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Email Id</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngIf="employees?.length === 0">
      <td colspan="6" class="text-center text-muted italic">No employees found in the system.</td>
    </tr>

    <tr *ngFor="let employee of employees">
      <td>{{ employee.firstName }}</td>
      <td>{{ employee.lastName }}</td>
      <td>{{ employee.emailId }}</td>
      <td><button class="btn btn-info" (click)="updateEmployee(employee.id)">Update</button></td>
      <td>
        <button class="btn btn-warning" (click)="employeeDetails(employee.id)">Details</button>
      </td>
      <td><button class="btn btn-danger" (click)="deleteEmployee(employee.id)">Delete</button></td>
    </tr>
  </tbody>
</table>
